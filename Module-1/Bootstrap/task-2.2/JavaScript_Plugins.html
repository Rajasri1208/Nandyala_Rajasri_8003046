<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 2.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="bootstrap/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h1 class="text-primary">
            Bootstrap JavaScript Plugin
        </h1>

        <p class="lead">
            This page demonstrates Bootstrap JS plugins.
        </p>

        <!-- Collapse Button -->
        <button class="btn btn-success"
                data-bs-toggle="collapse"
                data-bs-target="#demo">

            Show Message

        </button>

        <!-- Hidden Message -->
        <div id="demo"
             class="collapse mt-3">

            <div class="alert alert-info">

                Bootstrap JavaScript Plugin is Working!

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
