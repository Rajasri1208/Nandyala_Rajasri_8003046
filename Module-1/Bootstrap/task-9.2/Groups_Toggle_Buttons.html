<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 9.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="bootstrap/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h1 class="mb-4 text-primary">

            Button Groups

        </h1>

        <!-- Button Group -->
        <div class="btn-group mb-5">

            <button class="btn btn-primary">
                Left
            </button>

            <button class="btn btn-success">
                Middle
            </button>

            <button class="btn btn-danger">
                Right
            </button>

        </div>

        <h2 class="mb-3">

            Toggle Buttons

        </h2>

        <!-- Toggle Buttons -->
        <div class="btn-group"
             role="group">

            <!-- Checkbox 1 -->
            <input type="checkbox"
                   class="btn-check"
                   id="btncheck1"
                   autocomplete="off">

            <label class="btn btn-outline-primary"
                   for="btncheck1">

                Option 1

            </label>

            <!-- Checkbox 2 -->
            <input type="checkbox"
                   class="btn-check"
                   id="btncheck2"
                   autocomplete="off">

            <label class="btn btn-outline-success"
                   for="btncheck2">

                Option 2

            </label>

            <!-- Checkbox 3 -->
            <input type="checkbox"
                   class="btn-check"
                   id="btncheck3"
                   autocomplete="off">

            <label class="btn btn-outline-danger"
                   for="btncheck3">

                Option 3

            </label>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
