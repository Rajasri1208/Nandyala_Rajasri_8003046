<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Typography Exercise 7.1</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="bootstrap/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <!-- Display Heading -->
        <h1 class="display-1">

            Bootstrap Typography

        </h1>

        <!-- Lead Paragraph -->
        <p class="lead">

            This is a lead paragraph using Bootstrap.

        </p>

        <!-- Muted Text -->
        <p class="text-muted">

            This text appears muted/light gray.

        </p>

        <!-- Bold Text -->
        <p class="fw-bold">

            This text is bold using fw-bold.

        </p>

        <!-- Normal Text -->
        <p>

            This is normal paragraph text.

        </p>

    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
