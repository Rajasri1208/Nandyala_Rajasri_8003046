<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 8.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="bootstrap/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card p-4">

                    <h2 class="text-center mb-4">

                        Login Form

                    </h2>

                    <form>

                        <!-- Email Floating -->
                        <div class="form-floating mb-3">

                            <input type="email"
                                   class="form-control"
                                   id="email"
                                   placeholder="name@example.com">

                            <label for="email">

                                Email address

                            </label>

                        </div>

                        <!-- Password Floating -->
                        <div class="form-floating mb-3">

                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   placeholder="Password">

                            <label for="password">

                                Password

                            </label>

                        </div>

                        <!-- Login Button -->
                        <button type="submit"
                                class="btn btn-success w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
