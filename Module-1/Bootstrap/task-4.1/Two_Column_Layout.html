<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 4.1</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="bootstrap/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3">

                <div class="bg-secondary text-white p-4">

                    <h3>Sidebar</h3>

                    <p>
                        This is the sidebar section.
                    </p>

                </div>

            </div>

            <!-- Content Area -->
            <div class="col-md-9">

                <div class="bg-light p-4 border">

                    <h2>Main Content</h2>

                    <p>
                        This is the main content area using
                        col-md-9 class.
                    </p>

                    <p>
                        Bootstrap grid system divides the row
                        into 12 columns.
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
