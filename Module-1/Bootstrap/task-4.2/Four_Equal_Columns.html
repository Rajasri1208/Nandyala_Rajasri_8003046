<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 4.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="bootstrap/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h1 class="text-center text-primary mb-4">

            Four Column Layout

        </h1>

        <div class="row text-center">

            <!-- Column 1 -->
            <div class="col-sm-3">

                <div class="bg-primary text-white p-4 border">

                    Column 1

                </div>

            </div>

            <!-- Column 2 -->
            <div class="col-sm-3">

                <div class="bg-success text-white p-4 border">

                    Column 2

                </div>

            </div>

            <!-- Column 3 -->
            <div class="col-sm-3">

                <div class="bg-warning p-4 border">

                    Column 3

                </div>

            </div>

            <!-- Column 4 -->
            <div class="col-sm-3">

                <div class="bg-info p-4 border">

                    Column 4

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
