<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Colors</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">Dashboard</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="bg-primary text-white p-4 rounded">
                Users: 120
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-success text-white p-4 rounded">
                Sales: 350
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-warning text-dark p-4 rounded">
                Pending: 25
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-danger text-white p-4 rounded">
                Errors: 5
            </div>
        </div>

    </div>

</div>

</body>
</html>
