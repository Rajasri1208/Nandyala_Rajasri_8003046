<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Local Community Event Portal</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .controls {
            margin-bottom: 20px;
        }

        select,
        input,
        button {
            padding: 8px 12px;
            margin: 8px;
        }

        #loader {
            display: none;
            color: blue;
            font-size: 18px;
            margin: 15px 0;
        }

        #eventContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .event-card {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            width: 300px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        .event-card h2 {
            margin-top: 0;
        }

        .event-card button {
            margin-top: 10px;
        }

    </style>

</head>

<body>

    <h1>Welcome to the Community Event Portal</h1>

    <div class="controls">

        <!-- Category Filter -->
        <label for="categoryFilter">
            Filter by Category:
        </label>

        <select id="categoryFilter">

            <option value="All">All</option>
            <option value="Music">Music</option>
            <option value="Food">Food</option>
            <option value="Environment">
                Environment
            </option>

        </select>

        <!-- Search Box -->
        <input type="text"
               id="searchBox"
               placeholder="Search event name">

    </div>

    <!-- Loading Spinner -->
    <div id="loader">
        Loading events...
    </div>

    <!-- Events Display -->
    <div id="eventContainer"></div>

    <!-- External JavaScript -->
    <script src="main.js"></script>

</body>

</html>
