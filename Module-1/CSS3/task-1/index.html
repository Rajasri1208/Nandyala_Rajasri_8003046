<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
   
    <title>CSS Demo</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: lightblue;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">This is Inline CSS</h1>

    <h2>External CSS Heading</h2>

    <p>This paragraph uses external CSS.</p>

    <button>Click Me</button>

</body>
</html>
