<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Demo Project</title>

    <!-- Internal CSS -->
    <style>

        /* Body background using Internal CSS */
        body {
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

    </style>

    <!-- External CSS File -->
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <!-- Header Section -->
    <header>
        <!-- Inline CSS Example -->
        <h1 style="color: red;">
            This Heading uses Inline CSS
        </h1>

        <h2 class="main-heading">
            Welcome to CSS Learning
        </h2>
    </header>

    <!-- Content Section -->
    <section class="content-section">

        <p class="content">
            This paragraph is styled using External CSS.
        </p>

        <p class="content">
            CSS helps make webpages attractive and responsive.
        </p>

        <!-- CTA Button -->
        <button class="cta-button">
            Get Started
        </button>

    </section>

</body>
</html>
