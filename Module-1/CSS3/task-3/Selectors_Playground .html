<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors Playground</title>

    <!-- Internal CSS -->
    <style>

        /* Internal CSS for body background */
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }

    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <!-- Header Section -->
    <header id="mainHeader">

        <!-- Inline CSS -->
        <h1 style="color: red;">
            This Heading uses Inline CSS
        </h1>

        <h2>
            Welcome to CSS Selectors Playground
        </h2>

    </header>

    <!-- Event Cards Section -->
    <section class="content-section">

        <!-- Event Card 1 -->
        <div class="eventCard">

            <h3>Music Event</h3>

            <p>
                Join us for an exciting live music performance this weekend.
            </p>

            <button class="cta-button">
                Register Now
            </button>

        </div>

        <!-- Event Card 2 -->
        <div class="eventCard">

            <h3>Food Festival</h3>

            <p>
                Enjoy delicious dishes and desserts from famous chefs.
            </p>

            <button class="cta-button">
                Book Tickets
            </button>

        </div>

    </section>

</body>
</html>
